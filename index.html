<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>존스테이 — 지점 선택</title>
  <meta name="description" content="존스테이 지점 안내. 인천점 · 시흥점 운영 중. 지점을 선택하면 상세 페이지로 이동합니다.">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="static/css/common.css">
  <link rel="stylesheet" href="static/css/index.css">
  <script defer src="static/js/router.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Zone<span>Stay</span></a>
    <span class="nav-tag">지점 선택</span>
  </div>
</nav>

<main>
  <div class="inner">

    <!-- 좌측: 안내 + 지도 -->
    <div class="left">
      <div class="head">
        <p class="eyebrow">Zone Stay Residence</p>
        <h1 class="title">지점 안내</h1>
        <p class="lede">지도의 핀 또는 지점 목록을 선택하면 상세 페이지로 이동합니다.</p>
      </div>

      <!-- SVG 약식 지도: 인천 연안 · 송도 · 시흥 월곶 (실제 지형 기반) -->
      <div class="map-wrap">
        <svg viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="map-title map-desc">
          <title id="map-title">존스테이 지점 위치 약도</title>
          <desc id="map-desc">인천 연안과 송도, 시흥 월곶 일대를 표현한 약식 지도. 미추홀구의 인천점과 월곶 갯골 동쪽의 시흥점(모두 운영 중) 위치를 표시.</desc>

          <!-- 바다 (서해) -->
          <rect class="sea" x="0" y="0" width="1000" height="620"/>

          <!-- 영종도 자락 (좌상단) -->
          <path class="land" d="M0,0 L235,0 C205,26 150,44 95,40 C55,37 20,48 0,42 Z"/>

          <!-- 본토: 인천 연안 → 송도 매립지 → 남동·시흥 -->
          <path class="land" d="M340,0
            C330,30 322,50 298,64
            C286,74 290,90 288,106
            L290,192
            C294,228 312,252 306,290
            C302,316 320,330 332,342
            L400,356 L392,402 L344,416 L330,470 L352,506 L338,552 L372,580 L382,620
            L1000,620 L1000,0 Z"/>

          <!-- 인천항 부두 (연안·국제여객터미널) -->
          <path class="land" d="M289,148 h-40 v7 h40 Z"/>
          <path class="land" d="M289,168 h-47 v7 h47 Z"/>
          <path class="land" d="M290,188 h-38 v7 h38 Z"/>
          <path class="land" d="M306,278 h-31 v8 h31 Z"/>

          <!-- 월미도 · 소월미도 -->
          <ellipse class="land" cx="272" cy="68"  rx="15" ry="10"/>
          <ellipse class="land" cx="260" cy="120" rx="8"  ry="5.5"/>

          <!-- 월곶 갯골 (시흥 쪽 물길) -->
          <path class="sea" d="M700,620 C707,540 716,480 728,450 C731,443 737,443 740,450 C748,480 752,545 755,620 Z"/>
          <path class="canal" d="M734,446 C738,400 731,360 737,315 C741,290 736,265 731,240" stroke-width="3"/>

          <!-- 송도 수로 -->
          <path class="canal" d="M380,415 C420,440 445,458 450,480 C456,504 450,548 454,584"/>

          <!-- 녹지: 문학산 · 소래산 · 공원 -->
          <ellipse class="green" cx="580" cy="300" rx="26" ry="13"/>
          <ellipse class="green" cx="925" cy="168" rx="22" ry="12"/>
          <ellipse class="green" cx="620" cy="70"  rx="28" ry="12"/>

          <!-- 도로: 해안 간선(77) · 인천대교—제2경인 · 동측 남북축 -->
          <path class="rd"  d="M318,0 C306,70 300,150 310,225 C318,285 338,320 372,355 C410,395 462,420 532,442 C600,470 660,500 720,540 C760,565 820,585 900,600 L1000,612"/>
          <path class="hwy" d="M0,108 C120,175 250,265 350,335 C395,367 440,376 505,372 C580,368 640,356 705,350 C800,342 900,336 1000,332"/>
          <path class="hwy" d="M784,0 C772,120 756,300 744,390 C738,428 742,452 756,478 C778,518 830,552 890,572 C925,584 965,592 1000,596" stroke-width="3.5"/>

          <!-- 지명 라벨 -->
          <text class="district" x="620" y="172" text-anchor="middle">미추홀구</text>
          <text class="district" x="822" y="266" text-anchor="middle">남동구</text>
          <text class="district" x="462" y="432" text-anchor="middle">연수구</text>
          <text class="ref-label" x="240" y="222" text-anchor="middle">인천항</text>
          <text class="ref-label" x="400" y="560" text-anchor="middle">송도</text>
          <text class="ref-label" x="580" y="334" text-anchor="middle">문학산</text>
          <text class="ref-label" x="925" y="200" text-anchor="middle">소래산</text>
          <text class="ref-label" x="152" y="160" text-anchor="middle">인천대교</text>

          <!-- ── 인천점 핀 (미추홀구 · 운영 중, 다크+골드) ── -->
          <a class="pin-link" href="incheon/" aria-label="인천점 상세 페이지로 이동">
            <circle class="pulse" cx="531" cy="213" r="14"/>
            <g class="pin">
              <path class="pin-body" d="M531,119
                c-19.9,0 -36,16.1 -36,36
                c0,27 36,58 36,58
                s36,-31 36,-58
                c0,-19.9 -16.1,-36 -36,-36 Z"/>
              <circle class="pin-core" cx="531" cy="155" r="13"/>
            </g>
            <text class="pin-label" x="531" y="248" text-anchor="middle">인천점</text>
            <text class="pin-sub"   x="531" y="269" text-anchor="middle">NOW OPEN</text>
          </a>

          <!-- ── 시흥점 핀 (월곶 · 운영 중, 라이트+틸) ── -->
          <a class="pin-link" href="siheung/" aria-label="시흥점 상세 페이지로 이동">
            <circle class="pulse day" cx="798" cy="462" r="12"/>
            <g class="pin">
              <path class="pin-body day" d="M798,384
                c-16.6,0 -30,13.4 -30,30
                c0,22.5 30,48 30,48
                s30,-25.5 30,-48
                c0,-16.6 -13.4,-30 -30,-30 Z"/>
              <circle class="pin-core day" cx="798" cy="414" r="10.5"/>
            </g>
            <text class="pin-label" x="798" y="489" text-anchor="middle">시흥점</text>
            <text class="pin-sub day" x="798" y="509" text-anchor="middle">NOW OPEN</text>
          </a>
        </svg>
        <div class="map-legend">
          <span><span class="dot gold"></span>인천점 · 운영 중</span>
          <span><span class="dot teal"></span>시흥점 · 운영 중</span>
        </div>
      </div>
    </div>

    <!-- 우측: 지점 리스트 -->
    <div class="loc-list">
      <a class="loc-card night" href="incheon/" aria-label="인천점 상세 페이지로 이동">
        <div class="loc-head">
          <h2 class="loc-name">Zone<span>Stay</span> 인천점</h2>
          <span class="loc-status">운영 중</span>
        </div>
        <p class="loc-addr">인천 미추홀구 신세계빌딩 4층 · 인천지방법원 인근</p>
        <span class="loc-go">상세 페이지 →</span>
      </a>

      <a class="loc-card day" href="siheung/" aria-label="시흥점 상세 페이지로 이동">
        <div class="loc-head">
          <h2 class="loc-name">Zone<span>Stay</span> 시흥점</h2>
          <span class="loc-status">운영 중</span>
        </div>
        <p class="loc-addr">경기 시흥 월곶동 · 월곶포구 수변공원 앞 · 오션뷰 6개 호실</p>
        <span class="loc-go">상세 페이지 →</span>
      </a>
    </div>

  </div>
</main>

<footer>
  Zone<span>Stay</span> · 프리미엄 코리빙 레지던스 · 인천 · 시흥
</footer>

</body>
</html>
